services:
  - type: web
    name: car-gallery
    runtime: docker
    plan: starter
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/var/data/prod.sqlite
      - key: SCOPES
        value: read_files,write_files,write_app_proxy
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
    disk:
      name: car-gallery-data
      mountPath: /var/data
      sizeGB: 1
