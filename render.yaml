services:
  - type: web
    name: car-gallery
    runtime: docker
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:/tmp/prod.sqlite
      - key: SCOPES
        value: read_files,write_files,write_app_proxy
      - key: SHOPIFY_APP_URL
        value: https://car-gallery-4thd.onrender.com
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
